openapi: 3.1.0
info:
  title: OpenLLM Metrics - notifier
  version: '0.1.0'
  description: |
    Alert notification worker. Subscribes to alert.event.v1 on the streaming
    bus, matches each alert against per-tenant routing rules, and fans out to
    webhook or SMTP sinks. This HTTP surface serves the configuration CRUD API
    (channels and rules) and read-only delivery history.

    Tenancy: every CRUD and list endpoint requires the caller's tenant in the
    `X-Tenant-Id` request header. The OSS distribution does not implement
    authn/authz at this layer — operators are expected to front the notifier
    with a service-mesh or reverse-proxy policy that enforces tenancy.

    Every successful mutation emits an audit.event.v1 event for the F031
    audit ledger. A failed emit is logged but never surfaces to the API caller.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: http://localhost:8085
    description: Local development (default port)
paths:
  /v1/notification/channels:
    get:
      summary: List all notification channels for the tenant.
      operationId: listChannels
      parameters:
        - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Array of notification channels (may be empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Channel'
        '401':
          $ref: '#/components/responses/MissingTenant'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Create a notification channel.
      operationId: createChannel
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/Actor'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelInput'
      responses:
        '201':
          description: Channel created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/MissingTenant'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/notification/channels/{id}:
    get:
      summary: Get a notification channel by ID.
      operationId: getChannel
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/ChannelID'
      responses:
        '200':
          description: The requested channel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '401':
          $ref: '#/components/responses/MissingTenant'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: Update (replace) a notification channel.
      operationId: updateChannel
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/Actor'
        - $ref: '#/components/parameters/ChannelID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelInput'
      responses:
        '200':
          description: Channel updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/MissingTenant'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Delete a notification channel.
      operationId: deleteChannel
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/Actor'
        - $ref: '#/components/parameters/ChannelID'
      responses:
        '204':
          description: Channel deleted; no body.
        '401':
          $ref: '#/components/responses/MissingTenant'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/notification/rules:
    get:
      summary: List all notification rules for the tenant.
      operationId: listRules
      parameters:
        - $ref: '#/components/parameters/TenantID'
      responses:
        '200':
          description: Array of notification rules (may be empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Rule'
        '401':
          $ref: '#/components/responses/MissingTenant'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Create a notification rule.
      operationId: createRule
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/Actor'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleInput'
      responses:
        '201':
          description: Rule created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/MissingTenant'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/notification/rules/{id}:
    get:
      summary: Get a notification rule by ID.
      operationId: getRule
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/RuleID'
      responses:
        '200':
          description: The requested rule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '401':
          $ref: '#/components/responses/MissingTenant'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      summary: Update (replace) a notification rule.
      operationId: updateRule
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/Actor'
        - $ref: '#/components/parameters/RuleID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleInput'
      responses:
        '200':
          description: Rule updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/MissingTenant'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Delete a notification rule.
      operationId: deleteRule
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - $ref: '#/components/parameters/Actor'
        - $ref: '#/components/parameters/RuleID'
      responses:
        '204':
          description: Rule deleted; no body.
        '401':
          $ref: '#/components/responses/MissingTenant'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/notification/deliveries:
    get:
      summary: Read-only delivery history.
      description: |
        Returns delivery attempt records for the tenant. Filter by rule or
        by time window. Deliveries are written by the internal consumer
        loop and are never created or updated via the HTTP API.
      operationId: listDeliveries
      parameters:
        - $ref: '#/components/parameters/TenantID'
        - name: rule_id
          in: query
          required: false
          description: Filter by rule ID (exact match).
          schema:
            type: string
        - name: from
          in: query
          required: false
          description: Inclusive lower bound on created_at (RFC 3339).
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Inclusive upper bound on created_at (RFC 3339).
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Array of delivery records (may be empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Delivery'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/MissingTenant'
        '500':
          $ref: '#/components/responses/InternalError'

  /metrics:
    get:
      summary: Prometheus self-metrics scrape endpoint.
      description: |
        Returns the Prometheus text exposition of this service's own
        operational counters (config mutations, delivery attempts, sink
        errors, consumer lag, etc.).
      operationId: getMetrics
      responses:
        '200':
          description: Prometheus text exposition.
          content:
            text/plain:
              schema:
                type: string

  /healthz:
    get:
      summary: Liveness probe.
      operationId: getHealthz
      responses:
        '200':
          description: Process is alive.
          content:
            text/plain:
              schema:
                type: string
                example: ok

components:
  parameters:
    TenantID:
      name: X-Tenant-Id
      in: header
      required: true
      description: |
        Caller's tenant identifier. Validated as non-empty; returns 401
        when absent.
      schema:
        type: string
        example: 018e4c7a-1b2d-7000-8000-000000000001
    Actor:
      name: X-Actor
      in: header
      required: false
      description: |
        Caller principal recorded in audit events. Optional; omitting it
        results in an empty actor field on the audit event.
      schema:
        type: string
        example: alice@example.com
    ChannelID:
      name: id
      in: path
      required: true
      description: Notification channel ID.
      schema:
        type: string
        example: ch_01j8xkyz0000000000000001
    RuleID:
      name: id
      in: path
      required: true
      description: Notification rule ID.
      schema:
        type: string
        example: rule_01j8xkyz0000000000000001

  schemas:
    ChannelInput:
      type: object
      required:
        - name
        - kind
        - config
      properties:
        name:
          type: string
          description: Human-readable channel name.
          example: ops-webhook
        kind:
          type: string
          enum:
            - webhook
            - smtp
          description: Delivery kind. Only "webhook" and "smtp" are accepted.
        config:
          type: object
          additionalProperties: true
          description: |
            Kind-specific configuration object passed through verbatim.
            For webhook: include `url`, optional `secret`. For smtp:
            include SMTP server settings and recipients. The server does
            not validate the inner keys; the CHECK constraint on the
            database column is the source of truth.

    Channel:
      allOf:
        - $ref: '#/components/schemas/ChannelInput'
        - type: object
          required:
            - id
            - created_at
            - updated_at
          properties:
            id:
              type: string
              description: Channel identifier assigned by the store.
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    RuleInput:
      type: object
      required:
        - name
        - match
        - channel_ids
      properties:
        name:
          type: string
          description: Human-readable rule name.
          example: high-error-rate-alert
        match:
          type: object
          additionalProperties: true
          description: |
            Opaque JSON object describing the match criteria evaluated by
            the consumer loop against inbound alert.event.v1 payloads.
        channel_ids:
          type: array
          items:
            type: string
          description: IDs of the channels to fan out to when this rule matches.
          example:
            - ch_01j8xkyz0000000000000001

    Rule:
      allOf:
        - $ref: '#/components/schemas/RuleInput'
        - type: object
          required:
            - id
            - created_at
            - updated_at
          properties:
            id:
              type: string
              description: Rule identifier assigned by the store.
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    Delivery:
      type: object
      required:
        - id
        - rule_id
        - channel_id
        - alert_event_id
        - status
        - attempts
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
          description: Monotonically increasing delivery row ID.
        rule_id:
          type: string
          description: Rule that triggered this delivery.
        channel_id:
          type: string
          description: Channel this delivery was sent to.
        alert_event_id:
          type: string
          description: ID of the alert.event.v1 that triggered this delivery.
        status:
          type: string
          description: Delivery status (e.g. "sent", "failed", "pending").
          example: sent
        attempts:
          type: integer
          description: Number of delivery attempts made.
        last_error:
          type: string
          description: Error message from the last failed attempt. Omitted when empty.
        sent_at:
          type: string
          format: date-time
          description: Timestamp of the successful delivery. Null when not yet sent.
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request — missing or malformed input.
      content:
        text/plain:
          schema:
            type: string
          example: name is required
    MissingTenant:
      description: X-Tenant-Id header is absent.
      content:
        text/plain:
          schema:
            type: string
          example: missing X-Tenant-Id header
    NotFound:
      description: Resource not found within this tenant's scope.
      content:
        text/plain:
          schema:
            type: string
          example: not found
    InternalError:
      description: Unexpected internal error.
      content:
        text/plain:
          schema:
            type: string
          example: internal error
