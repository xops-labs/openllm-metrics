# Local-dev PostgreSQL stack.
# Usage: docker compose -f platform/db/docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openllm_metrics
      POSTGRES_USER: openllm
      POSTGRES_PASSWORD: devpassword
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U openllm -d openllm_metrics']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
