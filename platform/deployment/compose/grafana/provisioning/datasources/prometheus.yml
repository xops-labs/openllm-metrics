#
# Grafana datasource provisioning for the quickstart stack.
# Loaded automatically at Grafana startup.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: openllm-prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      prometheusType: Prometheus
      prometheusVersion: '2.52.0'
      minStep: 15s
