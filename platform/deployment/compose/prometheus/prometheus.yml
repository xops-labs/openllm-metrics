#
# Prometheus scrape config — quickstart compose.
#
# Trimmed copy of platform/tsdb/prometheus.yml that targets only the two
# Phase 1 services. Once Phase 2 pollers (F013-F016) land, mirror their
# scrape blocks from the canonical TSDB config.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    environment: quickstart
    platform: openllm-metrics

scrape_configs:
  # Prometheus self-monitoring.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # F010 — aggregator service: public scrape surface.
  - job_name: openllm_metrics_endpoint
    static_configs:
      - targets: ['metrics-endpoint:9090']
    metrics_path: /metrics
    scrape_interval: 30s
    relabel_configs:
      - target_label: service
        replacement: metrics-endpoint

  # F009 — OpenAI poller: exporter-health surface.
  - job_name: openllm_usage_poller_openai
    static_configs:
      - targets: ['openai-poller:8080']
    metrics_path: /metrics
    scrape_interval: 60s
    relabel_configs:
      - target_label: service
        replacement: usage-poller-openai
