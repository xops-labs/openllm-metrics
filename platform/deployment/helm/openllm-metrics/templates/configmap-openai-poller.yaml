{{- if .Values.openaiPoller.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openllm-metrics.fullname" . }}-openai-poller
  labels:
    {{- include "openllm-metrics.labels" . | nindent 4 }}
    app.kubernetes.io/component: openai-poller
data:
  openai.yaml: |
    server:
      port: 8080
    providers:
      openai:
        enabled: true
        api_key_env: {{ .Values.secrets.openaiAdminApiKey.secretKey | quote }}
        polling_interval_seconds: {{ .Values.openaiPoller.pollingIntervalSeconds }}
        base_url: https://api.openai.com
        circuit_breaker_threshold: 5
        circuit_breaker_cooldown_seconds: 60
        max_retries: 4
        dedup_cache_size: 4096
    bus:
      brokers:
        {{- range .Values.openaiPoller.bus.brokers }}
        - {{ . | quote }}
        {{- end }}
      client_id: {{ .Values.openaiPoller.bus.clientId | quote }}
    labels:
      env: {{ .Values.openaiPoller.labels.env | quote }}
      team: {{ .Values.openaiPoller.labels.team | quote }}
      tenant: {{ .Values.openaiPoller.labels.tenant | quote }}
      app: {{ .Values.openaiPoller.labels.app | quote }}
      project: {{ .Values.openaiPoller.labels.project | quote }}
      region: {{ .Values.openaiPoller.labels.region | quote }}
{{- end }}
