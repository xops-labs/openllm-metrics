Licensed under the Apache License, Version 2.0.

Placeholder Secret. Disabled by default — production deployments should
reference an externally-managed Secret (set `secrets.openaiAdminApiKey.create: false`,
which is the default) so rotation does not require a helm upgrade.
*/}}
{{- if .Values.secrets.openaiAdminApiKey.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.openaiAdminApiKey.secretName }}
  labels:
    {{- include "openllm-metrics.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Override at install time:
  #   --set-string secrets.openaiAdminApiKey.value=sk-admin-...
  {{ .Values.secrets.openaiAdminApiKey.secretKey }}: {{ required "secrets.openaiAdminApiKey.value is required when secrets.openaiAdminApiKey.create=true" .Values.secrets.openaiAdminApiKey.value | quote }}
{{- end }}
