# Example SLO: gateway p99 latency under 5 seconds, 99% of the rolling 30-day window.
#
# Reads:    the llm_gateway_latency_seconds histogram emitted by the gateway
#           (F018) at the proxy boundary; the recording rules at
#           platform/slo/prometheus/recording-rules.yaml consume it directly.
#           The shared OTel SDK (packages/telemetry/go) additionally emits the
#           gen_ai_client_operation_duration_seconds histogram for SDK-side
#           latency views.
# Filters:  tenant=acme, team=platform-search, app=rag-svc, provider=openai.
# Window:   30d compliance accounting; burn-rate alerts evaluate 1h/6h/1d/3d.
#
# Authors: copy this file, change the metadata, drop it into your SLO catalog
# location, and the burn-rate alerts at platform/slo/prometheus/alerts.yaml
# will start evaluating against it.

id: acme-rag-svc-latency-p99
name: 'RAG service p99 latency < 5s'
description: |
  The acme RAG service must answer 99% of LLM calls in under 5 seconds at the
  99th percentile across the rolling 30-day window. Breaches typically point at
  provider degradation or context-window growth; consult the runbook before
  paging on-call.
tenant: acme
team: platform-search
app: rag-svc
objective_type: latency_p99
target: 0.99
latency_bound_seconds: 5.0
window: 30d
provider: openai
version: 1
created_at: '2026-05-18T00:00:00Z'
owner: platform-search@acme.example
notification_channels:
  - slack-platform-search
  - pagerduty-platform-search
